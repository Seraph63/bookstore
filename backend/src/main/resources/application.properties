spring.application.name=demo

# Le configurazioni del database sono fornite tramite variabili di ambiente in Docker
# Vedi docker-compose.yml per PostgreSQL config

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Indica a Spring di eseguire schema.sql all'avvio
spring.sql.init.mode=always

# Importante: Disabilita il tentativo di Hibernate di usare i LOB JDBC
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
logging.level.org.hibernate.SQL=DEBUG
